name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Flying Whale Bot"
          git config user.email "bot@flyingwhale.io"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Auto-version
        id: version
        run: |
          node scripts/autoversion.mjs --no-git
          NEW=$(node -p "require('./package.json').version")
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: changed
        run: |
          git diff --quiet package.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit, tag, push
        if: steps.changed.outputs.changed == 'true'
        run: |
          V="${{ steps.version.outputs.version }}"
          git add package.json server.json CHANGELOG.md
          git commit -m "chore: release ${V}"
          git tag "v${V}"
          git push
          git push --tags

      - name: Build
        if: steps.changed.outputs.changed == 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.changed.outputs.changed == 'true'
        run: |
          V="${{ steps.version.outputs.version }}"
          PUBLISHED=$(npm view "flying-whale-mcp-server@${V}" version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "::notice::${V} already published, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@aibtcdev'

      - name: GitHub Packages publish
        if: steps.changed.outputs.changed == 'true'
        run: |
          npm pkg set name="@aibtcdev/aibtc-mcp-server"
          npm publish --access public || echo "::warning::GitHub Packages already exists"
          npm pkg set name="flying-whale-mcp-server"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to ClawHub
        if: steps.changed.outputs.changed == 'true'
        continue-on-error: true
        run: |
          V="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD | head -20)
          else
            CHANGELOG="Initial release"
          fi
          npx clawhub login --token "$CLAWHUB_API_TOKEN" --no-browser
          npx clawhub publish ./skill \
            --slug aibtc-bitcoin-wallet \
            --name "AIBTC Bitcoin Wallet" \
            --version "$V" \
            --changelog "$CHANGELOG" \
            --tags latest
        env:
          CLAWHUB_API_TOKEN: ${{ secrets.CLAWHUB_API_TOKEN }}
