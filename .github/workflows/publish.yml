name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty to use package.json version)'
        required: false
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing @aibtc/mcp-server@${VERSION}"
          if npm view "@aibtc/mcp-server@${VERSION}" version 2>/dev/null; then
            echo "::notice::@aibtc/mcp-server@${VERSION} already published, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@aibtcdev'

      - name: Publish to GitHub Packages
        run: |
          npm pkg set name="@aibtcdev/aibtc-mcp-server"
          npm publish --access public || echo "::warning::GitHub Packages publish failed, may already exist"
          npm pkg set name="@aibtc/mcp-server"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
